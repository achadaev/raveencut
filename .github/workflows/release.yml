name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create a GitHub release

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip uninstall -y torch
          pip install torch==2.8.0 --index-url https://download.pytorch.org/whl/cpu
          pip install pyinstaller

      - name: Download FFmpeg
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -UseBasicParsing
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          $bin = Get-ChildItem ffmpeg_tmp -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $bin.FullName vendor\ffmpeg.exe
          $bin = Get-ChildItem ffmpeg_tmp -Recurse -Filter "ffprobe.exe" | Select-Object -First 1
          Copy-Item $bin.FullName vendor\ffprobe.exe

      - name: Build with PyInstaller
        run: pyinstaller RaveenCut.spec --clean --noconfirm

      - name: Zip the bundle
        shell: pwsh
        run: Compress-Archive -Path dist\RaveenCut\* -DestinationPath RaveenCut-${{ github.ref_name }}-windows.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: RaveenCut-${{ github.ref_name }}-windows.zip
          generate_release_notes: true
